<!DOCTYPE html>
<html>
<head>
    <title>Simple GPT </title>

    <style>
       body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #f3d9ff, #ffd6e8);
    display: flex;
    justify-content: center;
    margin-top: 50px;
    animation: bgAnimation 8s infinite alternate;
}

@keyframes bgAnimation {
    from {
        background: linear-gradient(135deg, #ffe6f0, #f3d9ff);
    }
    to {
        background: linear-gradient(135deg, #ffd6e8, #ffe0f7);
    }
}

.chat-container {
    width: 500px;
    background: rgba(255, 255, 255, 0.95);
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
    border: 3px solid #ffb6c1;
    animation: floatBox 3s ease-in-out infinite;
}

@keyframes floatBox {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-8px);
    }
    100% {
        transform: translateY(0px);
    }
}

h2 {
    text-align: center;
    color: #d63384;
    font-size: 28px;
    text-shadow: 2px 2px 8px pink;
}

#chat-box {
    height: 400px;
    border: 2px solid #ffc0cb;
    overflow-y: auto;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 15px;
    background: #fff5fa;
}

#chat-box::-webkit-scrollbar {
    width: 8px;
}

#chat-box::-webkit-scrollbar-thumb {
    background: #ff69b4;
    border-radius: 10px;
}

.user {
    color: white;
    text-align: right;
    margin: 10px 0;
    background: #ff69b4;
    padding: 10px;
    border-radius: 15px 15px 0 15px;
    display: inline-block;
    max-width: 80%;

    float: right;
         clear: both;
}

.bot {
    color: #333;
    text-align: left;
    margin: 10px 0;
    background: #ffd6e8;
    padding: 10px;
    border-radius: 15px 15px 15px 0;
    display: inline-block;
    max-width: 80%;
    
    float: left;
    clear: both;
}

.input-area {
    display: flex;
    gap: 10px;
}

#user-input {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border: 2px solid #ffb6c1;
    border-radius: 25px;
    outline: none;
}

#user-input:focus {
    box-shadow: 0 0 10px pink;
}

button {
    padding: 12px 22px;
    cursor: pointer;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #ff69b4, #ff1493);
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #ff69b4;
}
    </style>
</head>

<body>

    <div class="chat-container">
        <h2>Simple GPT Chatbot</h2>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask anything...">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="input-area">
    

    <button onclick="startVoice()">🎤</button>
    <button onclick="sendMessage()">Send</button>

</div>
    </div>

    <script>
   
async function sendMessage() {

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const userMessage = input.value.trim();

    if (userMessage === "") return;

    // Display user message
    chatBox.innerHTML += `
        <div class="user"><b>You:</b> ${userMessage}</div>
    `;

    input.value = "";

    try {

        const response = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: userMessage
            })
        });

        const data = await response.json();

        // Display bot reply
        chatBox.innerHTML += `
            <div class="bot"><b>GPT:</b> ${data.reply}</div>
        `;

    } catch (error) {

        console.log("Browser Error:", error);

        chatBox.innerHTML += `
            <div class="bot">
                <b>GPT:</b> Unable to connect to server.
            </div>
        `;
    }

    // Auto-scroll

    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send message when Enter key is pressed
document.getElementById("user-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
    </script>

</body>
</html>
